# ── Porta del server ──────────────────────────────────────────────────────────
# Porta interna del container (come da CONTEXT.md)
server.port=9000
spring.application.name=materie-service

# Profilo attivo: "dev" in sviluppo locale, "prod" in produzione
# In dev viene attivato il DevTokenController per generare token di test
# PRODUZIONE: rimuovere questa riga e impostare il profilo dall'esterno con la variabile
# d'ambiente SPRING_PROFILES_ACTIVE=produzione (es. nel docker-compose.yml o sul server).
# Se questa riga rimane, sovrascrive qualsiasi variabile esterna e il servizio
# partirà sempre in modalità sviluppo, anche in produzione.
spring.profiles.active=sviluppo

# ── Database PostgreSQL ────────────────────────────────────────────────────────
# ${VARIABILE:valore_default} → usa la variabile d'ambiente se esiste,
# altrimenti usa il valore default (utile per sviluppo locale senza Docker)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/db_materie}
spring.datasource.username=${DB_USER:scuola}
spring.datasource.password=${DB_PASSWORD:scuola_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
# "update" = Hibernate crea/aggiorna le tabelle automaticamente all'avvio
# (il professore mostra questo metodo nelle slide)
# PRODUZIONE: cambiare "update" in "validate".
# - "update" (sviluppo): Hibernate modifica automaticamente le tabelle all'avvio.
#   Comodo in sviluppo, pericoloso in produzione perché potrebbe alterare tabelle
#   con dati reali se cambi un'entity per sbaglio.
# - "validate" (produzione): Hibernate controlla solo che le tabelle esistano e
#   corrispondano alle entity. Se non corrispondono, il servizio non parte (errore
#   esplicito) invece di fare modifiche silenziose al database.
spring.jpa.hibernate.ddl-auto=update

# PRODUZIONE: cambiare entrambe le righe a "false".
# Con "true" ogni query SQL viene stampata nei log: utile in sviluppo per il debug,
# ma in produzione riempie i log di rumore e può esporre dati sensibili.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ────────────────────────────────────────────────────────────────────────
# Chiave segreta condivisa tra tutti i microservizi per validare il token.
# Formato: stringa hex a 64 caratteri (= 32 byte = 256 bit).
# In produzione impostare la variabile d'ambiente JWT_CHIAVE_SEGRETA.
# PRODUZIONE: rimuovere il valore di default (la parte dopo i due punti).
# La sintassi ${VARIABILE:default} usa "default" se la variabile d'ambiente non è impostata.
# In produzione non ci deve essere un default: se la variabile manca, il servizio
# deve rifiutarsi di partire invece di usare silenziosamente una chiave hardcoded.
# Forma corretta per produzione: jwt.chiave-segreta=${JWT_CHIAVE_SEGRETA}
jwt.chiave-segreta=${JWT_CHIAVE_SEGRETA:4f7dca55901487f2df866a449e1716db88181900c248dcc83fe96fd3e70deb6a}

# Durata del token in millisecondi (default: 1 ora = 3.600.000 ms)
jwt.durata-ms=${JWT_DURATA_MS:3600000}

# ── Swagger / OpenAPI ─────────────────────────────────────────────────────────
app.version=1.0.0
app.description=Microservizio per la gestione del catalogo materie scolastiche

# ── Versioning Filter ──────────────────────────────────────────────────────────
# Il filtro converte /materie → /api/v1/materie (trasparente al client)
forward.version.from=/materie, /materie-classe
forward.version.to=/api/v1/materie, /api/v1/materie-classe
